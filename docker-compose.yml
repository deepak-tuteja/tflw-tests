services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-testflow_tests}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 2s
      timeout: 3s
      retries: 20
    # No named/host volume — an ephemeral per-run DB is the isolation model
    # (plan_v2.md Part A); `node cli.mjs stop` runs `down -v` so every
    # `start` begins from a clean database.

  api:
    build:
      context: ./apiV2
    depends_on:
      postgres:
        condition: service_healthy
    # M33 (plan_v2.md Part R Cluster C) — the container needs to dial back out to a throwaway
    # HTTP receiver bound on the host (started by tflw's JS escape hatch, `tests/helpers/
    # webhook-receiver.ts`), so `host.docker.internal` has to resolve from inside this container.
    # Docker Desktop provides this for free; the special `host-gateway` value is what makes it
    # resolve under plain Docker Engine on Linux too (20.10+).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-testflow_tests}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-5s}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-1h}
      JWT_SESSION_TTL: ${JWT_SESSION_TTL:-1h}
      JWT_SESSION_REFRESH_TTL: ${JWT_SESSION_REFRESH_TTL:-2h}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      ADMIN_PW: ${ADMIN_PW:-admin-pw-123}
      USER_A_EMAIL: ${USER_A_EMAIL:-alice@example.com}
      USER_A_PW: ${USER_A_PW:-alice-pw-123}
      USER_B_EMAIL: ${USER_B_EMAIL:-bob@example.com}
      USER_B_PW: ${USER_B_PW:-bob-pw-123}
      OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID:-tflw-oauth-client}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-tflw-oauth-secret}
      OAUTH_ACCESS_TTL: ${OAUTH_ACCESS_TTL:-1h}
      OAUTH_SHORT_CLIENT_ID: ${OAUTH_SHORT_CLIENT_ID:-tflw-oauth-short-client}
      OAUTH_SHORT_CLIENT_SECRET: ${OAUTH_SHORT_CLIENT_SECRET:-tflw-oauth-short-secret}
      OAUTH_SHORT_ACCESS_TTL: ${OAUTH_SHORT_ACCESS_TTL:-5s}
      PORT: 4001
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/v1/health"]
      interval: 2s
      timeout: 3s
      retries: 20

  # TLS sidecar (M22, enterprise arc cluster 1 — PLAN_ENTERPRISE.md decision 10): a self-signed
  # HTTPS listener (8443) and a client-cert-requiring listener (8444), both proxying to `api`
  # unchanged. Certs generated fresh at container start (nginx/docker-entrypoint.sh), written to
  # a host bind mount so a host-side `tflw run` can reference the CA/client cert directly.
  nginx:
    build:
      context: ./nginx
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8443:8443"
      - "8444:8444"
    volumes:
      - ./nginx/certs:/certs
    healthcheck:
      test: ["CMD", "wget", "--no-check-certificate", "-qO-", "https://127.0.0.1:8443/v1/health"]
      interval: 2s
      timeout: 3s
      retries: 20
