<meta charset="utf-8">
<title>testFlow-tests — Log In</title>
<link rel="stylesheet" href="/styles.css">

<h1>Log In</h1>
<form id="login-form">
  <label for="email">Email</label>
  <input id="email" name="email" type="email" placeholder="admin@test.com" required>

  <label for="password">Password</label>
  <input id="password" name="password" type="password" placeholder="admin123" required>

  <button type="submit">Log In</button>
  <p id="error" class="error" hidden></p>
</form>

<div id="toast"></div>

<script type="module">
  import { loginSession, showToast } from '/app.js';

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorEl = document.getElementById('error');
    errorEl.hidden = true;
    try {
      await loginSession(email, password);
      showToast('Logged in');
      window.location.href = '/products.html';
    } catch (err) {
      errorEl.textContent = err.message;
      errorEl.hidden = false;
    }
  });
</script>
