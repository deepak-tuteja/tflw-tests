worker_processes 1;
events {
  worker_connections 1024;
}

http {
  # Self-signed HTTPS, no client cert required — dogfoods tflw's `insecure true` /
  # NODE_EXTRA_CA_CERTS / `--forbid-insecure` (M22, cluster 1+2).
  server {
    listen 8443 ssl;
    server_name _;

    ssl_certificate     /certs/server.pem;
    ssl_certificate_key /certs/server.key;

    location / {
      proxy_pass http://api:4001;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
    }
  }

  # Same self-signed server cert, but also requires a client certificate signed by the same
  # throwaway CA — dogfoods tflw's mTLS `cert`/`key` config (M22, cluster 1).
  server {
    listen 8444 ssl;
    server_name _;

    ssl_certificate        /certs/server.pem;
    ssl_certificate_key    /certs/server.key;
    ssl_client_certificate /certs/ca.pem;
    ssl_verify_client      on;

    location / {
      proxy_pass http://api:4001;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $remote_addr;
      proxy_set_header X-Client-DN $ssl_client_s_dn;
    }
  }
}
